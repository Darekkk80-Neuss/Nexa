<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1024px;height:500px;overflow:hidden}
  body{
    font-family:'DejaVu Sans','Segoe UI',system-ui,sans-serif;
    background:#0a0d15;
    position:relative;
  }
  /* Farbige Glows im Effyra-Verlauf (Violett -> Cyan) */
  .bg{position:absolute;inset:0;
    background:
      radial-gradient(680px 520px at 88% 18%, rgba(139,92,246,.42), transparent 60%),
      radial-gradient(620px 520px at 6% 108%, rgba(6,182,212,.30), transparent 60%),
      linear-gradient(135deg,#0b0f1a 0%,#080a12 100%);
  }
  .grid{position:absolute;inset:0;opacity:.06;
    background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);
    background-size:52px 52px}
  .wrap{position:absolute;inset:0;display:flex;align-items:center;padding:0 68px;gap:44px}
  .left{flex:1;min-width:0}
  .brandrow{display:flex;align-items:center;gap:20px;margin-bottom:14px}
  .logo{width:88px;height:88px;flex:none;filter:drop-shadow(0 8px 30px rgba(139,92,246,.55))}
  .word{font-size:82px;font-weight:800;letter-spacing:-2px;line-height:1;
    background:linear-gradient(120deg,#a78bfa 0%,#c4b5fd 40%,#22d3ee 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{font-size:30px;font-weight:600;color:#e5e7eb;letter-spacing:.2px;margin:2px 0 24px}
  .tag b{color:#a78bfa;font-weight:700}
  .pills{display:flex;flex-direction:column;gap:12px;align-items:flex-start}
  .pill{display:flex;align-items:center;gap:10px;
    font-size:21px;font-weight:600;color:#e8eaf0;
    background:rgba(255,255,255,.06);border:1px solid rgba(167,139,250,.35);
    padding:11px 20px;border-radius:999px}
  .pill .e{font-size:23px}
  /* Große dekorative Uhr rechts */
  .art{width:300px;height:300px;flex:none;opacity:.9;filter:drop-shadow(0 12px 50px rgba(34,211,238,.35))}
</style></head><body>
  <div class="bg"></div><div class="grid"></div>
  <div class="wrap">
    <div class="left">
      <div class="brandrow">
        <svg class="logo" viewBox="0 0 512 512"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
          <rect width="512" height="512" rx="118" fill="#0d1019"/>
          <circle cx="256" cy="256" r="176" fill="none" stroke="url(#g)" stroke-width="26"/>
          <g stroke="url(#g)" stroke-width="18" stroke-linecap="round"><path d="M256 116v26M396 256h-26M256 396v-26M116 256h26"/></g>
          <path d="M256 256V150M256 256l74 44" fill="none" stroke="url(#g)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="256" cy="256" r="22" fill="#22d3ee"/></svg>
        <div class="word">Effyra</div>
      </div>
      <div class="tag">Gewinnt dir <b>Zeit</b> zurück.</div>
      <div class="pills">
        <div class="pill"><span class="e">📄</span> Briefe verstehen</div>
        <div class="pill"><span class="e">📅</span> Fristen automatisch</div>
        <div class="pill"><span class="e">👪</span> Familie organisieren</div>
      </div>
    </div>
    <svg class="art" viewBox="0 0 512 512"><defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
      <circle cx="256" cy="256" r="176" fill="none" stroke="url(#g2)" stroke-width="20"/>
      <g stroke="url(#g2)" stroke-width="14" stroke-linecap="round" opacity=".8"><path d="M256 116v26M396 256h-26M256 396v-26M116 256h26"/></g>
      <path d="M256 256V150M256 256l74 44" fill="none" stroke="url(#g2)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="256" cy="256" r="18" fill="#22d3ee"/></svg>
  </div>
</body></html>
