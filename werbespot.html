<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Effyra – Werbefilm</title>
<meta name="description" content="Effyra – dein persönlicher KI-Alltagsmanager. Sieh dir den Film an.">
<meta name="theme-color" content="#07090f">
<style>
  :root{
    --bg:#07090f; --card:#111524; --card2:#161b2b; --border:rgba(255,255,255,.10);
    --text:#f5f7fb; --muted:#aeb6c6; --faint:#7c869b;
    --v:#7c3aed; --c:#06b6d4; --grad:linear-gradient(135deg,#7c3aed,#06b6d4);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(124,58,237,.22), transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, rgba(6,182,212,.18), transparent 55%),
      var(--bg);
    color:var(--text); font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100dvh; display:flex; flex-direction:column; align-items:center;
    padding:24px 18px calc(24px + env(safe-area-inset-bottom)); line-height:1.55;
  }
  .wrap{width:100%; max-width:760px; margin:auto; display:flex; flex-direction:column; align-items:center; gap:22px}

  /* Kopf: Logo + Sprachumschalter */
  header{width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px}
  .logo{display:flex; align-items:center; gap:10px; font-weight:800; font-size:22px; letter-spacing:.2px}
  .logo .dot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
    background:var(--grad); box-shadow:0 6px 18px rgba(124,58,237,.4); font-size:16px}
  .logo b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .langsw{display:flex; gap:4px; padding:4px; background:var(--card); border:1px solid var(--border); border-radius:999px}
  .langsw button{border:0; background:transparent; color:var(--muted); font-weight:700; font-size:13px;
    padding:8px 13px; border-radius:999px; cursor:pointer; min-height:38px; transition:.18s}
  .langsw button.on{background:var(--grad); color:#fff; box-shadow:0 4px 12px rgba(124,58,237,.35)}

  /* Überschrift */
  .head{text-align:center; margin-top:6px}
  .head h1{margin:0 0 8px; font-size:clamp(26px,6vw,40px); font-weight:800; letter-spacing:-.5px}
  .head p{margin:0; color:var(--muted); font-size:clamp(15px,3.6vw,18px); max-width:34ch; margin-inline:auto}

  /* Video-Rahmen */
  .stage{width:100%; position:relative; border-radius:22px; overflow:hidden;
    background:var(--card2); border:1px solid var(--border); box-shadow:0 30px 80px rgba(0,0,0,.5)}
  video{display:block; width:100%; height:auto; background:#000; aspect-ratio:16/9}
  video::-webkit-media-controls-panel{background:rgba(0,0,0,.4)}

  /* Play-Overlay (Klick zum Abspielen mit Ton) */
  .cover{position:absolute; inset:0; display:grid; place-items:center; cursor:pointer;
    background:radial-gradient(circle at center, rgba(124,58,237,.18), rgba(0,0,0,.55));
    transition:opacity .25s}
  .cover.hide{opacity:0; pointer-events:none}
  .play{width:84px;height:84px;border-radius:50%; background:var(--grad); display:grid; place-items:center;
    box-shadow:0 12px 40px rgba(124,58,237,.55); animation:pulse 2.2s ease-in-out infinite}
  .play svg{width:34px;height:34px;fill:#fff;margin-left:5px}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .cover .hint{position:absolute; bottom:16px; color:#fff; font-weight:700; font-size:14px;
    text-shadow:0 2px 8px rgba(0,0,0,.6)}

  /* Platzhalter, wenn (noch) keine MP4-Datei vorhanden ist */
  .novideo{display:none; aspect-ratio:16/9; width:100%; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; text-align:center; padding:28px; color:var(--muted)}
  .novideo.show{display:flex}
  .novideo .big{font-size:52px}
  .novideo b{color:var(--text); font-size:18px}
  .novideo code{background:var(--card); border:1px solid var(--border); border-radius:8px; padding:2px 7px;
    font-size:13px; color:var(--c)}

  /* CTA + Fuß */
  .cta{display:inline-flex; align-items:center; gap:10px; text-decoration:none; color:#fff; font-weight:800;
    font-size:17px; padding:16px 26px; border-radius:999px; background:var(--grad); min-height:52px;
    box-shadow:0 14px 36px rgba(124,58,237,.4); transition:.18s}
  .cta:hover{transform:translateY(-2px); box-shadow:0 18px 44px rgba(124,58,237,.5)}
  footer{color:var(--faint); font-size:13px; text-align:center}
  footer a{color:var(--muted)}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo"><span class="dot">🕐</span> <b>Effyra</b></div>
      <div class="langsw" id="langsw" role="group" aria-label="Sprache / Language">
        <button data-set="de">DE</button>
        <button data-set="en">EN</button>
      </div>
    </header>

    <div class="head">
      <h1 id="hTitle">Ruhe für deinen Alltag</h1>
      <p id="hSub">Effyra – dein persönlicher KI-Alltagsmanager. Sieh dir den Film an.</p>
    </div>

    <div class="stage">
      <video id="vid" playsinline preload="metadata" controls></video>
      <div class="cover" id="cover">
        <div class="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="hint" id="playHint">Film abspielen ▶</div>
      </div>
      <div class="novideo" id="novideo">
        <span class="big">🎬</span>
        <b id="nvTitle">Video wird in Kürze verfügbar sein.</b>
        <span id="nvHint">Lade die Videodateien in den Projektordner:<br>
          <code>werbespot-de.mp4</code> &nbsp;·&nbsp; <code>werbespot-en.mp4</code></span>
      </div>
    </div>

    <a class="cta" id="cta" href="./">✨ <span id="ctaLbl">Jetzt kostenlos ausprobieren</span></a>
    <footer><span id="fLine">© Effyra</span> · <a href="./">Zur App</a></footer>
  </div>

<script>
(function(){
  // Videodateien – hier bei Bedarf umbenennen (müssen im selben Ordner liegen).
  var FILES = { de: 'werbespot-de.mp4', en: 'werbespot-en.mp4' };

  var T = {
    de: {
      title: 'Ruhe für deinen Alltag',
      sub: 'Effyra – dein persönlicher KI-Alltagsmanager. Sieh dir den Film an.',
      play: 'Film abspielen ▶',
      cta: 'Jetzt kostenlos ausprobieren',
      nvTitle: 'Video wird in Kürze verfügbar sein.',
      nvHint: 'Lade die Videodateien in den Projektordner:<br><code>werbespot-de.mp4</code> &nbsp;·&nbsp; <code>werbespot-en.mp4</code>',
      toApp: 'Zur App'
    },
    en: {
      title: 'Calm for your everyday life',
      sub: 'Effyra – your personal AI life manager. Watch the film.',
      play: 'Play the film ▶',
      cta: 'Try it for free',
      nvTitle: 'The video will be available shortly.',
      nvHint: 'Upload the video files to the project folder:<br><code>werbespot-de.mp4</code> &nbsp;·&nbsp; <code>werbespot-en.mp4</code>',
      toApp: 'Open the app'
    }
  };

  var $ = function(id){ return document.getElementById(id); };
  var vid = $('vid'), cover = $('cover'), novideo = $('novideo');

  // Sprachwahl: ?lang= → gespeicherte Wahl → Gerätesprache. Deutsch nur für "de*", sonst Englisch.
  function detect(){
    var url = new URLSearchParams(location.search).get('lang');
    var saved = null; try { saved = localStorage.getItem('effyra_promo_lang'); } catch(e){}
    var nav = (navigator.language || navigator.userLanguage || 'en').slice(0,2).toLowerCase();
    var c = (url || saved || nav || 'en').toLowerCase();
    return c === 'de' ? 'de' : 'en';
  }

  var cur = null;
  function apply(lang, remember){
    cur = (lang === 'de') ? 'de' : 'en';
    var t = T[cur];
    document.documentElement.lang = cur;
    $('hTitle').textContent = t.title;
    $('hSub').textContent = t.sub;
    $('playHint').textContent = t.play;
    $('ctaLbl').textContent = t.cta;
    $('nvTitle').textContent = t.nvTitle;
    $('nvHint').innerHTML = t.nvHint;
    Array.prototype.forEach.call(document.querySelectorAll('footer a'), function(a){ a.textContent = t.toApp; });
    Array.prototype.forEach.call(document.querySelectorAll('#langsw button'), function(b){
      b.classList.toggle('on', b.dataset.set === cur);
    });
    if (remember){ try { localStorage.setItem('effyra_promo_lang', cur); } catch(e){} }

    // Videoquelle setzen; Platzhalter zurücksetzen und neu prüfen.
    novideo.classList.remove('show');
    vid.style.display = '';
    cover.classList.remove('hide');
    vid.pause();
    vid.src = FILES[cur];
    vid.load();
  }

  // Datei fehlt / nicht abspielbar → freundlicher Platzhalter statt kaputtem Player.
  vid.addEventListener('error', showMissing);
  function showMissing(){
    vid.style.display = 'none';
    cover.classList.add('hide');
    novideo.classList.add('show');
  }

  // Klick auf Overlay → mit Ton abspielen.
  cover.addEventListener('click', function(){
    vid.muted = false;
    var p = vid.play();
    if (p && p.catch) p.catch(function(){ /* Autoplay evtl. blockiert – Nutzer nutzt dann die Controls */ });
    cover.classList.add('hide');
  });
  vid.addEventListener('play', function(){ cover.classList.add('hide'); });
  vid.addEventListener('pause', function(){ if (vid.currentTime === 0 || vid.ended) cover.classList.remove('hide'); });

  // Manueller Umschalter
  document.getElementById('langsw').addEventListener('click', function(e){
    var b = e.target.closest('[data-set]'); if (!b) return;
    apply(b.dataset.set, true);
  });

  apply(detect(), false);
})();
</script>
</body>
</html>
